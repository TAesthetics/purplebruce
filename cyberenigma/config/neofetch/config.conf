# CyberEnigma neofetch config — compact, uses ~/.config/neofetch/ascii.txt
print_info() {
    info title
    info underline
    info "OS"        distro
    info "Host"      model
    info "Kernel"    kernel
    info "Uptime"    uptime
    info "Packages"  packages
    info "Shell"     shell
    info "Terminal"  term
    info "CPU"       cpu
    info "Memory"    memory
    info cols
}

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
memory_percent="off"
memory_unit="mib"
package_managers="on"
shell_path="off"
shell_version="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# CyberEnigma: custom snake/rune/saturn ascii
image_backend="ascii"
image_source="auto"
ascii_distro="custom"
ascii_file="$HOME/.config/neofetch/ascii.txt"
ascii_bold="on"
# c1 = magenta 201 (snake), c2 = purple 129 (saturn rings)
ascii_colors=(201 129)

colors=(distro)
bold="on"
underline_enabled="on"
underline_char="─"
separator=":"

block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

bar_char_elapsed="─"
bar_char_total="═"
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

stdout="off"
