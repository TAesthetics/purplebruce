; Purple Bruce M5Stick — PlatformIO configuration v2.0
; Build: pio run
; Flash: pio run -t upload
; Monitor: pio device monitor

[platformio]
default_envs = m5stick-c-plus

; ── M5StickC Plus (primary — 135×240 screen) ─────────────────────
[env:m5stick-c-plus]
platform          = espressif32
board             = m5stick-c-plus
framework         = arduino
lib_deps          =
    m5stack/M5StickCPlus @ ^0.0.8
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    bblanchon/ArduinoJson @ ^7.0.0
monitor_speed     = 115200
upload_speed      = 1500000
; upload_port     = /dev/ttyUSB0   ; set your serial port here

; ── M5StickC (original — 80×160 screen) ──────────────────────────
[env:m5stick-c]
platform          = espressif32
board             = m5stick-c
framework         = arduino
lib_deps          =
    m5stack/M5StickC @ ^0.2.6
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    bblanchon/ArduinoJson @ ^7.0.0
build_flags       = -DSTICK_C
monitor_speed     = 115200
upload_speed      = 1500000
; upload_port     = /dev/ttyUSB0

; ── Shared build options ──────────────────────────────────────────
[env]
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DBOARD_HAS_PSRAM=0
