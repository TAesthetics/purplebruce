; Purple Bruce M5Stick — PlatformIO configuration
; Build: pio run
; Flash: pio run -t upload
; Monitor: pio device monitor

[platformio]
default_envs = m5stick-c-plus

; ── M5StickC Plus (primary — 135×240 screen) ──────────────────
[env:m5stick-c-plus]
platform          = espressif32
board             = m5stick-c-plus
framework         = arduino
lib_deps          =
    m5stack/M5StickCPlus @ ^0.0.8
monitor_speed     = 115200
upload_speed      = 1500000
; upload_port     = /dev/ttyUSB0   ; uncomment & set your port

; ── M5StickC (original — 80×160 screen) ───────────────────────
[env:m5stick-c]
platform          = espressif32
board             = m5stick-c
framework         = arduino
lib_deps          =
    m5stack/M5StickC @ ^0.2.6
build_flags       = -DSTICK_C
monitor_speed     = 115200
upload_speed      = 1500000
; upload_port     = /dev/ttyUSB0

; ── Shared build flags ─────────────────────────────────────────
[env]
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
