<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUD — PURPLE BRUCE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --v: #aa44ff; --c: #00ffff; --g: #00ff88; --y: #ffdd00;
  --r: #ff3355; --d: #334; --bg: #000; --fg: #cdf;
}
html,body { background:#000; color:var(--fg); font-family:'Courier New',monospace;
            height:100%; overflow:hidden; user-select:none; }

/* scanline overlay */
body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(
  0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
  pointer-events:none; z-index:999; }

.hud { display:grid; grid-template-rows:auto 1fr auto auto; height:100vh; gap:1px;
       padding:2px; }

/* ── TOP BAR ─────────────────────────────────────────── */
.top { display:flex; justify-content:space-between; align-items:center;
       padding:4px 8px; border-bottom:1px solid var(--v); background:#0a0010; }
.clock { font-size:clamp(24px,6vw,52px); letter-spacing:4px; color:var(--c);
         text-shadow:0 0 20px var(--c); font-weight:bold; }
.date  { font-size:11px; color:var(--d); opacity:.7; text-align:right; }
.conn  { width:8px; height:8px; border-radius:50%; background:var(--r);
         box-shadow:0 0 8px var(--r); animation:pulse 1s infinite; }
.conn.ok { background:var(--g); box-shadow:0 0 8px var(--g); animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── AI TEAM STATUS ──────────────────────────────────── */
.team { padding:6px 8px; display:flex; flex-wrap:wrap; gap:4px; }
.provider { display:flex; align-items:center; gap:4px; padding:3px 6px;
            border:1px solid #223; font-size:10px; }
.provider .dot { width:6px; height:6px; border-radius:50%; }
.dot.ok  { background:var(--g); box-shadow:0 0 6px var(--g); }
.dot.err { background:var(--r); box-shadow:0 0 6px var(--r); }
.dot.off { background:#334; }

/* ── DRONE PANEL ─────────────────────────────────────── */
.drone-bar { display:flex; gap:8px; padding:4px 8px; border-top:1px solid #223;
             font-size:11px; }
.drone-bar .label { color:var(--d); }
.drone-bar .val   { color:var(--c); }
.drone-bar .bat   { color:var(--g); }
.drone-bar .bat.low { color:var(--r); }
.drone-btn { padding:2px 8px; border:1px solid var(--v); background:transparent;
             color:var(--v); font-family:inherit; font-size:10px; cursor:pointer; }
.drone-btn:active { background:var(--v); color:#000; }

/* ── MAIN FEED ───────────────────────────────────────── */
.feed { overflow-y:auto; padding:4px 8px; font-size:11px; line-height:1.6; }
.feed::-webkit-scrollbar { width:2px; }
.feed::-webkit-scrollbar-thumb { background:var(--v); }
.event { display:flex; gap:6px; padding:2px 0; border-bottom:1px solid #111; }
.event .ts  { color:#334; min-width:55px; font-size:10px; }
.event .src { min-width:50px; }
.event.info  .src { color:var(--c); }
.event.warn  .src { color:var(--y); }
.event.alert .src { color:var(--r); }
.event.ai    .src { color:var(--v); }
.event.drone .src { color:var(--g); }

/* ── COMMAND INPUT ───────────────────────────────────── */
.cmd-bar { display:flex; align-items:center; gap:6px; padding:4px 8px;
           border-top:1px solid var(--v); background:#0a0010; }
.cmd-bar .prompt { color:var(--v); font-size:13px; }
#cmd { flex:1; background:transparent; border:none; outline:none; color:var(--c);
       font-family:inherit; font-size:13px; caret-color:var(--c); }
#cmd::placeholder { color:#334; }
.send-btn { padding:4px 10px; border:1px solid var(--c); background:transparent;
            color:var(--c); font-family:inherit; font-size:12px; cursor:pointer; }

/* ── OVERLAY (alerts) ────────────────────────────────── */
.alert-overlay { display:none; position:fixed; inset:0; background:rgba(255,0,50,.15);
                 border:2px solid var(--r); z-index:900; justify-content:center;
                 align-items:center; font-size:clamp(16px,5vw,32px); color:var(--r);
                 text-shadow:0 0 20px var(--r); letter-spacing:4px; animation:flicker .3s infinite; }
.alert-overlay.show { display:flex; }
@keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.7} }
</style>
</head>
<body>

<div class="hud">
  <div class="top">
    <div>
      <div class="clock" id="clk">00:00:00</div>
      <div class="date"  id="dat">—</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:10px;color:#334;margin-bottom:4px;">PURPLE BRUCE HUD</div>
      <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;">
        <span style="font-size:10px;color:#334" id="ws-txt">OFFLINE</span>
        <div class="conn" id="ws-dot"></div>
      </div>
    </div>
  </div>

  <div class="team" id="team">
    <div class="provider"><div class="dot off"></div><span>Loading...</span></div>
  </div>

  <div class="feed" id="feed"></div>

  <div class="drone-bar" id="drone-bar">
    <span class="label">DRONE</span>
    <span id="d-status" class="val">OFFLINE</span>
    <span class="label">BAT</span>
    <span id="d-bat" class="bat">--</span>
    <span class="label">ALT</span>
    <span id="d-alt" class="val">--</span>
    <span class="label">SPD</span>
    <span id="d-spd" class="val">--</span>
    <button class="drone-btn" onclick="droneCmd('emergency')" style="margin-left:auto;color:#f35;border-color:#f35">STOP</button>
    <button class="drone-btn" onclick="window.location='/drone'">CTRL</button>
  </div>

  <div class="cmd-bar">
    <span class="prompt">❯</span>
    <input id="cmd" placeholder="ask lucy anything…" autocomplete="off" spellcheck="false">
    <button class="send-btn" onclick="sendCmd()">SEND</button>
  </div>
</div>

<div class="alert-overlay" id="alert-overlay">⚠ ALERT</div>

<script>
const MAX_EVENTS = 80;
let ws, reconnectTimer;
let events = [];

function ts() {
  const n = new Date();
  return n.toTimeString().slice(0,8);
}

function addEvent(src, text, level='info') {
  events.push({ ts: ts(), src, text, level });
  if (events.length > MAX_EVENTS) events.shift();
  renderFeed();
}

function renderFeed() {
  const f = document.getElementById('feed');
  f.innerHTML = events.slice().reverse().map(e =>
    `<div class="event ${e.level}">
      <span class="ts">${e.ts}</span>
      <span class="src">[${e.src}]</span>
      <span>${e.text}</span>
    </div>`
  ).join('');
}

// ── Clock ────────────────────────────────────────────────────────────────────
function tickClock() {
  const n = new Date();
  document.getElementById('clk').textContent = n.toTimeString().slice(0,8);
  document.getElementById('dat').textContent =
    n.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
setInterval(tickClock, 1000); tickClock();

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    clearTimeout(reconnectTimer);
    document.getElementById('ws-dot').className = 'conn ok';
    document.getElementById('ws-txt').textContent = 'LIVE';
    ws.send(JSON.stringify({ action: 'get_status' }));
    ws.send(JSON.stringify({ action: 'get_provider' }));
    addEvent('SYS', 'Connected to Purple Bruce', 'info');
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'conn';
    document.getElementById('ws-txt').textContent = 'OFFLINE';
    addEvent('SYS', 'Connection lost — reconnecting…', 'warn');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onmessage = e => {
    try { handleMsg(JSON.parse(e.data)); } catch {}
  };
}

function handleMsg(m) {
  if (m.type === 'provider_status') renderTeam(m.data);
  else if (m.type === 'team_status') renderTeam(m.data?.providers);
  else if (m.type === 'soc_alert') {
    addEvent('SOC', `${m.data.type}: ${(m.data.detail||'').slice(0,80)}`,
      m.data.severity === 'CRITICAL' ? 'alert' : 'warn');
    if (m.data.severity === 'CRITICAL') flashAlert(`⚠ ${m.data.type}`);
  }
  else if (m.type === 'chat_message' && m.data?.role === 'assistant')
    addEvent('AI', m.data.content.slice(0,120), 'ai');
  else if (m.type === 'team_heal')
    addEvent('HEAL', `${m.data.provider}: ${m.data.action}`, 'info');
  else if (m.type === 'drone_telemetry') updateDroneTelemetry(m.data);
  else if (m.type === 'drone_status') updateDroneStatus(m.data);
}

function renderTeam(providers) {
  if (!providers) return;
  // supports both raw object from provider_status and nested from team_status
  const list = typeof providers === 'object' && providers.grokHasKey !== undefined
    ? Object.entries({
        grok: { ok: providers.grokHasKey },
        venice: { ok: providers.veniceHasKey },
        gemini: { ok: providers.geminiHasKey },
        claude: { ok: providers.claudeHasKey },
        openrouter: { ok: providers.openrouterHasKey },
        openclaw: { ok: providers.openclawEnabled },
      })
    : Object.entries(providers).map(([k,v]) => [k, { ok: v.hasKey || v.healthy }]);

  document.getElementById('team').innerHTML = list.map(([name, info]) =>
    `<div class="provider">
      <div class="dot ${info.ok ? 'ok' : 'off'}"></div>
      <span style="color:#889;font-size:10px">${name.toUpperCase().slice(0,6)}</span>
    </div>`
  ).join('');
}

function updateDroneStatus(d) {
  document.getElementById('d-status').textContent = d.connected ? 'ACTIVE' : 'OFFLINE';
  document.getElementById('d-status').style.color = d.connected ? 'var(--g)' : 'var(--r)';
  if (d.telemetry) updateDroneTelemetry(d.telemetry);
  if (d.connected) addEvent('DRONE', `Connected to ${d.ip || 'DJI Mini 4K'}`, 'drone');
}

function updateDroneTelemetry(t) {
  const bat = t.battery;
  const batEl = document.getElementById('d-bat');
  batEl.textContent = bat != null ? bat + '%' : '--';
  batEl.className = 'bat' + (bat != null && bat < 20 ? ' low' : '');
  document.getElementById('d-alt').textContent = t.altitude != null ? t.altitude.toFixed(1)+'m' : '--';
  document.getElementById('d-spd').textContent = t.speed_h != null ? t.speed_h.toFixed(1)+'m/s' : '--';
}

function flashAlert(msg) {
  const el = document.getElementById('alert-overlay');
  el.textContent = msg;
  el.className = 'alert-overlay show';
  setTimeout(() => { el.className = 'alert-overlay'; }, 3000);
}

// ── Command ──────────────────────────────────────────────────────────────────
function sendCmd() {
  const inp = document.getElementById('cmd');
  const txt = inp.value.trim();
  if (!txt || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ action: 'chat', message: txt }));
  addEvent('ME', txt, 'info');
  inp.value = '';
}

function droneCmd(cmd) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ action: 'drone_command', cmd }));
}

document.getElementById('cmd').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendCmd();
});

connect();
</script>
</body>
</html>
