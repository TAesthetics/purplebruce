<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content,viewport-fit=cover">
<title>Purple Bruce v5.0 — Lucy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--void:#050312;--bg:#0a0618;--surface:rgba(18,11,32,.72);--card:rgba(24,16,42,.65);--border:rgba(127,0,255,.22);--violet:#7F00FF;--violet-deep:#6B00B0;--violet-soft:#9a4dff;--vg:#7f00ff66;--vg-strong:#7f00ffcc;--red:#ff2d55;--rg:#ff2d5588;--cyan:#00f0ff;--cg:#00f0ff55;--mag:#ff2d95;--gold:#ffb347;--green:#39ff14;--purple:#a78bfa;--text:#e4dff5;--tb:#f6f1ff;--td:#8a82a8;--tm:#46405f;--f:'Share Tech Mono','Courier New',monospace;--fd:'Orbitron','Share Tech Mono',monospace;--rad-pill:999px;--rad-lg:18px;--rad-md:14px;--rad-sm:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%}
body{background:radial-gradient(1200px 600px at 80% -10%,rgba(127,0,255,.18),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(0,240,255,.10),transparent 60%),radial-gradient(700px 400px at 50% 120%,rgba(255,45,149,.08),transparent 65%),var(--bg);color:var(--text);font-family:var(--f);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--violet),var(--violet-deep));border-radius:var(--rad-pill)}
input,textarea,select{font-family:var(--f)}input::placeholder{color:var(--tm)}
.crt{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}@keyframes glow{0%,100%{box-shadow:0 0 20px var(--vg),inset 0 0 20px rgba(127,0,255,.12)}50%{box-shadow:0 0 34px var(--vg-strong),inset 0 0 28px rgba(127,0,255,.22)}}
@keyframes cmdPulse{0%,100%{border-color:var(--gold);box-shadow:0 0 12px rgba(255,179,71,.2)}50%{border-color:var(--violet);box-shadow:0 0 20px var(--vg)}}
@keyframes socBlink{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s infinite}.glow{animation:glow 3s ease-in-out infinite}
.topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(18px) saturate(1.2);background:linear-gradient(180deg,rgba(10,6,24,.85),rgba(10,6,24,.55));border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.logo{font-family:var(--fd);font-weight:900;letter-spacing:2px;font-size:18px;background:linear-gradient(90deg,var(--violet-soft),var(--violet),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo .at{color:var(--cyan);-webkit-text-fill-color:var(--cyan);font-weight:700}
.pill-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--rad-pill);border:1px solid var(--border);background:rgba(20,14,34,.55);font-size:10px;font-family:var(--fd);letter-spacing:1.5px;color:var(--text);font-weight:700;cursor:default;white-space:nowrap}
.pill.click{cursor:pointer;transition:.2s}.pill.click:hover{border-color:var(--violet);transform:translateY(-1px)}
.pill .dot{width:7px;height:7px;border-radius:50%;display:inline-block;box-shadow:0 0 8px currentColor}
.pill.on{color:var(--green);border-color:rgba(57,255,20,.35)}.pill.off{color:var(--red);border-color:rgba(255,45,85,.4)}
.pill.vio{color:var(--violet-soft);border-color:rgba(127,0,255,.45)}.pill.cy{color:var(--cyan);border-color:rgba(0,240,255,.35)}.pill.mg{color:var(--mag);border-color:rgba(255,45,149,.35)}
.pill.soc-on{color:var(--cyan);border-color:rgba(0,240,255,.4);animation:socBlink 3s infinite}.pill.soc-off{color:var(--tm);border-color:var(--border)}
.pill.clock{color:var(--tb);font-variant-numeric:tabular-nums;font-size:11px;letter-spacing:2px}
.tbar{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom,0px));left:12px;right:12px;z-index:100;background:rgba(10,6,24,.75);backdrop-filter:blur(22px) saturate(1.3);border:1px solid var(--border);border-radius:var(--rad-pill);display:flex;padding:8px;gap:4px;box-shadow:0 8px 40px rgba(127,0,255,.18)}
.chat-input-row{display:flex;gap:8px;align-items:stretch}
.chat-input-row .inp{flex:1;min-height:42px;padding:10px 14px;font-size:12px}
.chat-input-row .mic-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(180deg,rgba(0,240,255,.18),rgba(0,240,255,.05));border:1px solid var(--cyan);color:var(--cyan);font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(0,240,255,.25);flex:0 0 42px;cursor:pointer;padding:0}
.chat-input-row .send-btn{height:42px;padding:0 16px;border-radius:var(--rad-pill);border:1px solid var(--mag);color:var(--mag);background:linear-gradient(180deg,rgba(255,45,149,.16),rgba(255,45,149,.04));font-family:var(--fd);font-size:14px;letter-spacing:2px;font-weight:700;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;min-width:48px}
.chat-input-row .send-btn:disabled{border-color:var(--tm);color:var(--tm);background:transparent;cursor:default}
.chat-input-bar{padding:8px 12px;flex-shrink:0;border-top:1px solid var(--border);background:rgba(10,6,24,.75);backdrop-filter:blur(14px);padding-bottom:calc(76px + env(safe-area-inset-bottom,0px))}
.agent-tab{display:flex;flex-direction:column;height:calc(100dvh - 56px)}
.tbtn{flex:1;background:0;border:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 2px;border-radius:var(--rad-pill);transition:.2s}
.tbtn .i{font-size:15px;transition:.2s}.tbtn .l{font-size:7.5px;font-family:var(--fd);letter-spacing:1.5px;font-weight:700}
.tbtn.a{background:linear-gradient(180deg,rgba(127,0,255,.25),rgba(107,0,176,.12));box-shadow:0 0 18px var(--vg)}.tbtn.a .i{color:var(--violet-soft)}.tbtn.a .l{color:var(--violet-soft)}
.tbtn:not(.a) .i,.tbtn:not(.a) .l{color:var(--tm)}.tbtn:not(.a):hover{background:rgba(127,0,255,.08)}
.btn{background:linear-gradient(180deg,rgba(127,0,255,.18),rgba(107,0,176,.08));border:1px solid var(--violet);border-radius:var(--rad-pill);padding:10px 18px;color:var(--violet-soft);font-size:10px;font-weight:700;font-family:var(--fd);letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 16px var(--vg);transition:transform .15s,box-shadow .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 26px var(--vg-strong)}.btn:active{transform:translateY(0)}.btn:disabled{border-color:var(--tm);color:var(--tm);box-shadow:none;cursor:default;transform:none}
.btn.s{padding:7px 12px;font-size:8.5px;letter-spacing:1.5px}
.btn.cy{border-color:var(--cyan);color:var(--cyan);background:linear-gradient(180deg,rgba(0,240,255,.15),rgba(0,240,255,.04))}.btn.mg{border-color:var(--mag);color:var(--mag);background:linear-gradient(180deg,rgba(255,45,149,.16),rgba(255,45,149,.04))}.btn.gn{border-color:var(--green);color:var(--green);background:linear-gradient(180deg,rgba(57,255,20,.14),rgba(57,255,20,.04))}.btn.rd{border-color:var(--red);color:var(--red);background:linear-gradient(180deg,rgba(255,45,85,.16),rgba(255,45,85,.04))}
.inp{width:100%;background:rgba(5,3,18,.7);border:1px solid var(--border);border-radius:var(--rad-md);padding:11px 14px;color:var(--text);font-size:12px;outline:0;transition:border-color .2s,box-shadow .2s}.inp:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(127,0,255,.18)}
.tout{background:rgba(5,3,18,.75);border:1px solid var(--border);border-radius:var(--rad-lg);padding:12px 14px;max-height:500px;overflow-y:auto;font-size:11px;line-height:1.7;box-shadow:inset 0 0 24px rgba(127,0,255,.06)}
.tl{white-space:pre-wrap;word-break:break-word}.tl.stdout{color:var(--td)}.tl.stderr,.tl.warn{color:var(--gold)}.tl.error{color:var(--red)}.tl.info{color:var(--cyan)}.tl.cmd{color:var(--tb);font-weight:700}.tl.next{color:var(--mag)}
.cb{max-width:90%;border-radius:var(--rad-lg);padding:10px 14px;backdrop-filter:blur(6px);margin-bottom:4px}
.cb.user{align-self:flex-end;background:linear-gradient(135deg,rgba(127,0,255,.22),rgba(107,0,176,.12));border:1px solid rgba(127,0,255,.45)}
.cb.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--border)}
.cb.tool{align-self:flex-start;background:rgba(0,240,255,.03);border:1px solid rgba(0,240,255,.18);max-width:95%;font-size:10px}
.cb.soc{align-self:flex-start;background:rgba(255,45,85,.04);border:1px solid rgba(255,45,85,.2);max-width:95%}
.cb.exec{align-self:flex-start;background:rgba(57,255,20,.03);border:1px solid rgba(57,255,20,.12);max-width:95%;font-size:10px}
.approval{animation:cmdPulse 2s infinite;border-radius:var(--rad-md);padding:14px;margin:8px 0;background:linear-gradient(135deg,rgba(255,179,71,.06),rgba(127,0,255,.04))}
.md{flex:1;background:rgba(20,14,34,.5);border:1px solid var(--border);border-radius:var(--rad-pill);padding:8px;color:var(--td);font-size:9px;font-family:var(--fd);letter-spacing:1.5px;cursor:pointer;font-weight:700;transition:.2s}.md.a{background:linear-gradient(180deg,rgba(127,0,255,.28),rgba(107,0,176,.12));border-color:var(--violet);color:var(--violet-soft)}
.tc{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-md);padding:10px 12px;cursor:pointer;text-align:left;width:100%;transition:.2s;backdrop-filter:blur(6px)}.tc:hover{border-color:rgba(127,0,255,.5)}.tc.a{background:linear-gradient(135deg,rgba(127,0,255,.22),rgba(255,45,149,.08));border-color:var(--violet)}
.modal-overlay{position:fixed;inset:0;background:rgba(2,1,8,.72);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);backdrop-filter:blur(24px) saturate(1.3);border:1px solid var(--border);border-radius:var(--rad-lg);padding:24px;width:100%;max-width:520px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 80px rgba(127,0,255,.22)}
.chk{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad-md);margin-bottom:5px;cursor:pointer;font-size:11px;transition:.2s}.chk:hover{border-color:var(--violet)}.chk input{accent-color:var(--violet);width:15px;height:15px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);padding:14px 16px;backdrop-filter:blur(8px)}
/* CoT styling */
.cot-think{color:var(--gold);border-left:2px solid var(--gold);padding-left:8px;margin:3px 0}.cot-plan{color:var(--cyan);border-left:2px solid var(--cyan);padding-left:8px;margin:3px 0}.cot-cmd{color:var(--tb);background:rgba(127,0,255,.08);border:1px solid rgba(127,0,255,.2);border-radius:var(--rad-sm);padding:4px 8px;margin:3px 0;font-weight:700;display:inline-block}.cot-analysis{color:var(--green);border-left:2px solid var(--green);padding-left:8px;margin:3px 0}.cot-done{color:var(--green);font-weight:700}
@media(max-width:420px){.logo{font-size:16px}.pill{font-size:9px;padding:4px 8px}}

.call-modal{position:fixed;inset:0;background:rgba(5,3,18,0.97);z-index:9999;display:none;flex-direction:column;color:var(--text);font-family:var(--f)}
.call-modal.active{display:flex}
.call-chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;min-height:0}
.call-chat .cm{max-width:85%;padding:8px 12px;border-radius:14px;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.call-chat .cm.user{align-self:flex-end;background:linear-gradient(135deg,rgba(127,0,255,.3),rgba(107,0,176,.15));border:1px solid rgba(127,0,255,.5);color:var(--tb)}
.call-chat .cm.assistant{align-self:flex-start;background:rgba(24,16,42,.7);border:1px solid var(--border);color:var(--text)}
.call-chat .cm.system{align-self:flex-start;background:rgba(0,240,255,.05);border:1px solid rgba(0,240,255,.2);color:var(--cyan);font-size:10px}
.call-chat .cm .cot-think{color:var(--gold);border-left:2px solid var(--gold);padding-left:6px;margin:2px 0}
.call-chat .cm .cot-plan{color:var(--cyan);border-left:2px solid var(--cyan);padding-left:6px;margin:2px 0}
.call-chat .cm .cot-cmd{color:var(--tb);background:rgba(127,0,255,.1);border:1px solid rgba(127,0,255,.25);border-radius:6px;padding:2px 6px;margin:2px 0;font-weight:700;display:inline-block}
.call-chat .cm .cot-analysis{color:var(--green);border-left:2px solid var(--green);padding-left:6px;margin:2px 0}
.call-chat .cm .cot-done{color:var(--green);font-weight:700}
.call-bottom{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:20px 16px 30px;border-top:1px solid rgba(127,0,255,.15);background:rgba(5,3,18,.8)}
.call-wave{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#39ff1422,transparent);margin-bottom:16px}
.call-wave.listening{animation:pulse-wave 1.2s infinite ease-in-out}
.call-wave.idle{animation:pulse-wave 3s infinite ease-in-out;opacity:.4}
@keyframes pulse-wave{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.3);opacity:1}}
.call-mic-btn{width:80px;height:80px;border-radius:50%;background:#39ff14;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 40px #39ff14aa;cursor:pointer;border:none;animation:micPulse 1.5s infinite}
.call-mic-btn.idle{background:#ff2d55;box-shadow:0 0 30px #ff2d55aa;animation:none}
@keyframes micPulse{0%,100%{transform:scale(1);box-shadow:0 0 40px #39ff14aa}50%{transform:scale(1.12);box-shadow:0 0 60px #39ff14cc}}
.call-status{font-size:13px;margin-top:12px;opacity:0.8;font-family:var(--fd);letter-spacing:2px}
.call-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(127,0,255,.15)}
/* ── Voice v2 ── */
.visualizer{display:flex;align-items:flex-end;gap:5px;height:72px;margin-bottom:14px;justify-content:center}
.vbar{width:9px;border-radius:5px 5px 2px 2px;background:var(--cyan);animation:bar-dance .75s ease-in-out infinite}
.vbar:nth-child(2){animation-delay:.1s}.vbar:nth-child(3){animation-delay:.2s}.vbar:nth-child(4){animation-delay:.3s}
.vbar:nth-child(5){animation-delay:.4s}.vbar:nth-child(6){animation-delay:.5s}.vbar:nth-child(7){animation-delay:.6s}.vbar:nth-child(8){animation-delay:.7s}
@keyframes bar-dance{0%,100%{height:6px;background:var(--cyan)}50%{height:50px;background:var(--mag)}}
.vbar.idle{animation:none!important;height:3px!important;background:var(--tm)!important}
.vbar.processing{animation:bar-proc .25s ease-in-out infinite}
@keyframes bar-proc{0%,100%{height:22px;background:var(--gold)}50%{height:54px;background:var(--violet-soft)}}
.provider-badge{font-family:var(--fd);font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:999px;border:1px solid;display:inline-flex;align-items:center;gap:4px}
.provider-badge.grok{color:#ff00ff;border-color:#ff00ff44;background:rgba(255,0,255,.08)}
.provider-badge.venice{color:var(--mag);border-color:rgba(255,45,149,.4);background:rgba(255,45,149,.08)}
.provider-badge.gemini{color:var(--cyan);border-color:rgba(0,240,255,.4);background:rgba(0,240,255,.08)}
.latency-pill{font-size:8px;color:var(--green);font-family:var(--fd);letter-spacing:1.5px;padding:2px 6px;border:1px solid rgba(57,255,20,.3);border-radius:999px;background:rgba(57,255,20,.06)}
.cb.team{align-self:flex-start;background:rgba(127,0,255,.04);border:1px solid rgba(127,0,255,.2);max-width:95%;font-size:10px}
.team-dot-ok{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);display:inline-block}
.team-dot-off{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block}
.team-dot-na{width:7px;height:7px;border-radius:50%;background:var(--tm);display:inline-block}
</style>
</head>
<body>
<div class="crt"></div>
<div id="voiceCallModal" class="call-modal">
  <div class="call-header">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-family:var(--fd);font-size:12px;letter-spacing:3px;color:var(--violet-soft)">⬡ VOICE CALL — LUCY</span>
      <span id="callProviderBadge" class="provider-badge grok">⚡ GROK-3</span>
      <span id="callLatencyPill" class="latency-pill" style="display:none"></span>
    </div>
    <button id="endCallBtn" style="padding:6px 16px;background:rgba(255,45,85,.15);color:var(--red);border:1px solid var(--red);border-radius:999px;font-size:10px;font-family:var(--fd);letter-spacing:2px;cursor:pointer">END CALL</button>

      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>

      <button data-lang="de-DE" class="call-lang-btn" style="padding:3px 10px;border-radius:999px;cursor:pointer;background:transparent;color:var(--violet-soft);border:1px solid var(--violet)">DE</button>
      <button data-lang="en-US" class="call-lang-btn" style="padding:3px 10px;border-radius:999px;cursor:pointer;background:transparent;color:var(--td);border:1px solid var(--border)">EN</button>
      <button id="pttModeBtn" style="padding:3px 10px;border-radius:999px;cursor:pointer;background:transparent;color:var(--td);border:1px solid var(--border)">PTT OFF</button>

    </div>
  </div>

<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

function useWS(){
  const ws=useRef(null),handlers=useRef({}),[conn,setConn]=useState(false);
  const connect=useCallback(()=>{
    const url=`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}`;
    console.log('[WS] connecting →',url);
    const w=new WebSocket(url);
    w.onopen=()=>{console.log('[WS] open');setConn(true);ws.current=w};
    w.onclose=(e)=>{console.warn('[WS] close code=',e?.code,'reason=',e?.reason);setConn(false);ws.current=null;setTimeout(connect,2000)};
    w.onerror=(e)=>console.error('[WS] error',e);
    w.onmessage=e=>{try{const m=JSON.parse(e.data);handlers.current[m.type]?.(m.data,m.channel)}catch(err){console.error('[WS] parse',err)}};
  },[]);
  useEffect(()=>{connect();return()=>ws.current?.close()},[connect]);
  const send=useCallback((a,d={})=>{
    if(ws.current?.readyState===1){
      console.log('[WS] send',a,d);
      ws.current.send(JSON.stringify({action:a,...d}));
    }else{
      console.warn('[WS] not open, drop',a,'state=',ws.current?.readyState);
    }
  },[]);
  const on=useCallback((t,h)=>{handlers.current[t]=h},[]);
  // Expose for raw-DOM handlers (push-to-talk etc.) — keeps the PTT helpers decoupled from React
  useEffect(()=>{window.__pbSend=send;return()=>{if(window.__pbSend===send)window.__pbSend=null}},[send]);
  return{send,on,conn};
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const voiceSupported=!!SR&&!!window.speechSynthesis;
function speakableText(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const out=[];
  for(const l of lines){
    if(/^(⚡\s*)?CMD:/i.test(l))continue;
    if(/^🧠\s*THINK:|^\[THINK\]/i.test(l))continue;
    if(/^📋\s*PLAN:|^\[PLAN\]/i.test(l))continue;
    let t=l;
    t=t.replace(/^SAY:\s*/i,'');
    t=t.replace(/^📊\s*ANALYSIS:\s*/i,'');
    t=t.replace(/^🔄\s*NEXT:\s*/i,'Next: ');
    t=t.replace(/^✅\s*DONE\s*:?\s*/i,'Done. ');
    t=t.replace(/[🧠📋⚡📊🔄✅⬡🛡🔴🟠🟡🟢]/g,'');
    t=t.replace(/`[^`]*`/g,'');
    if(t)out.push(t);
  }
  return out.join(' ').slice(0,600);
}
let currentTtsAudio=null;

async function speakElevenLabs(text){
  try{

    if(!r.ok)return false;
    const blob=await r.blob();

    audio.onended=audio.onerror=()=>{try{URL.revokeObjectURL(url)}catch{} if(currentTtsAudio===audio)currentTtsAudio=null;if(currentTtsUrl===url)currentTtsUrl=null;};
    await audio.play();

}
function speakWebSpeech(clean){
  try{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(clean);
    // Softer & more natural than pitch=1.5 — still girly but not chipmunk.
    u.rate=0.95;u.pitch=1.3;u.volume=1.0;

    const isGerman=/[äöüß]/i.test(clean)||/\b(ich|und|nicht|der|die|das|ein|mit|auf|wir|bitte|danke|master)\b/i.test(clean);
    if(isGerman)u.lang='de-DE'; else u.lang='en-US';
    const pool=voices.filter(v=>isGerman?/^de/i.test(v.lang):/^en/i.test(v.lang));
    // Prefer the most natural female voices per platform — Apple's Anna/Petra/Helena for
    // German, Samantha for English. Avoid the old "Google Deutsch" robot voice when
    // anything better is available.
    const prefNames = isGerman
      ? [/Anna/i, /Petra/i, /Marlene/i, /Helena/i, /Viktoria/i, /Google.*Deutsch/i]
      : [/Samantha/i, /Karen/i, /Moira/i, /Tessa/i, /Fiona/i, /Ava/i, /Google US English/i];
    let pref;
    for(const rx of prefNames){ pref = pool.find(v=>rx.test(v.name)); if(pref) break; }
    pref = pref || pool.find(v=>!/Male/i.test(v.name)) || pool[0] || voices[0];
    if(pref){u.voice=pref; console.log('[TTS]',isGerman?'de':'en','→',pref.name);}

let __pttRec=null,__pttStream=null,__pttChunks=[],__pttMime='audio/webm';
function __pttPickMime(){

async function pttStart(onStatus){

  __pttRec=__pttMime?new MediaRecorder(__pttStream,{mimeType:__pttMime}):new MediaRecorder(__pttStream);

  try{__pttRec.stop();}catch{}
  await stopP;

  const blob=new Blob(__pttChunks,{type:__pttMime||'audio/webm'});
  console.log('[STT] blob bytes=',blob.size,'type=',blob.type);
  __pttRec=null;__pttStream=null;__pttChunks=[];
  if(blob.size<800){onStatus?.('too short — hold and speak');return false;}

// Stabiler Mic — ref-based callback, never stale
// Pulls language from (priority):  explicit call arg  →  window.__micLang  →  navigator.language  →  'de-DE'
function pickMicLang(override){
  if(override)return override;
  if(typeof window!=='undefined'&&window.__micLang)return window.__micLang;
  const nl=(typeof navigator!=='undefined'&&navigator.language)||'de-DE';
  // Normalize to BCP-47 forms Chrome supports
  if(/^de/i.test(nl))return 'de-DE';
  if(/^en/i.test(nl))return 'en-US';
  return nl;
}
async function ensureMicPermission(){
  try{
    if(!navigator.mediaDevices?.getUserMedia){console.warn('[MIC] getUserMedia unavailable');return false;}
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop()); // release — SpeechRecognition opens its own stream
    return true;
  }catch(e){console.error('[MIC] permission denied:',e?.name,e?.message);return false;}

function useStableMic() {
  const [listening, setListening] = useState(false);
  const [lang, setLang] = useState(pickMicLang());
  const rec = useRef(null);
  const restartTimer = useRef(null);
  const activeRef = useRef(false);
  const langRef = useRef(lang);
  const onFinalRef = useRef(null);
  const onInterimRef = useRef(null);
  const onStatusRef = useRef(null);

  useEffect(()=>{langRef.current=lang},[lang]);

  const start = useCallback(async () => {
    if (!SR) { console.warn('[MIC] SpeechRecognition not supported in this browser'); onStatusRef.current?.('SpeechRecognition not supported'); return; }
    if (typeof window!=='undefined' && window.__callMuted) { console.log('[MIC] start() blocked — muted'); return; }
    const granted = await ensureMicPermission();
    if (!granted) { onStatusRef.current?.('Mic permission denied — allow microphone and retry'); return; }
    activeRef.current = true;
    try {
      const r = new SR();
      r.lang = langRef.current || 'de-DE';
      r.interimResults = true;
      r.continuous = true;
      console.log('[MIC] starting recognition — lang=', r.lang);
      r.onstart = () => { console.log('[MIC] onstart'); onStatusRef.current?.(`LUCY IS LISTENING (${r.lang})`); };
      // Quality filters to stop the recognizer from firing on every ambient blip:
      // - minimum length  (>= 3 chars)
      // - minimum confidence on the final alternative (>= 0.35)
      // - dedupe against the last FINAL emitted within 2.5s
      // - drop filler-only utterances ("ok", "ja", "hm", "uh", "mhm", ...)
      let _lastFinal = '', _lastFinalAt = 0;
      const _filler = /^(?:ok|okay|ja|nein|hm+|mhm+|uh+|äh+|ähm+|eh+|mh+|so|ah|oh|yeah|yes|no)$/i;
      r.onresult = e => {
        let finalTxt = '', interimTxt = '', conf = 0;
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const alt = e.results[i][0];
          const t = alt.transcript;
          if (e.results[i].isFinal) { finalTxt += t; conf = Math.max(conf, alt.confidence || 0); }
          else interimTxt += t;
        }
        if (interimTxt) { console.log('[MIC] interim:', interimTxt); onInterimRef.current?.(interimTxt.trim()); }
        if (!finalTxt) return;
        const cleaned = finalTxt.trim().replace(/\s+/g, ' ');
        const now = Date.now();
        if (cleaned.length < 3) { console.log('[MIC] drop: too short →', cleaned); return; }
        if (conf && conf < 0.35) { console.log('[MIC] drop: low confidence', conf, '→', cleaned); return; }
        if (_filler.test(cleaned)) { console.log('[MIC] drop: filler →', cleaned); return; }
        if (cleaned === _lastFinal && (now - _lastFinalAt) < 2500) { console.log('[MIC] drop: duplicate →', cleaned); return; }
        _lastFinal = cleaned; _lastFinalAt = now;
        console.log('[MIC] FINAL:', cleaned, 'conf=', conf.toFixed(2));
        onFinalRef.current?.(cleaned);
      };
      r.onend = () => {
        console.log('[MIC] onend — activeRef=', activeRef.current);
        setListening(false);
        if (activeRef.current) restartTimer.current = setTimeout(() => start(), 300);
      };
      r.onerror = ev => {
        console.error('[MIC] onerror:', ev.error, ev.message || '');
        onStatusRef.current?.(`mic error: ${ev.error}`);
        setListening(false);
        // Don't loop forever on fatal errors
        if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed' || ev.error === 'audio-capture') {
          activeRef.current = false;
          return;
        }
        if (activeRef.current) restartTimer.current = setTimeout(() => start(), 500);
      };
      r.start();
      rec.current = r;
      setListening(true);
    } catch(e) { console.error('[MIC] start() threw:', e?.message || e); setListening(false); }
  }, []);

  const stop = useCallback(() => {
    console.log('[MIC] stop()');
    activeRef.current = false;
    clearTimeout(restartTimer.current);
    try { rec.current?.stop(); } catch {}
    setListening(false);
  }, []);

  const setMicLang = useCallback((l)=>{
    console.log('[MIC] setMicLang →', l);
    window.__micLang = l;
    setLang(l);
    // Restart recognition with new language if currently active
    if (activeRef.current) {
      try { rec.current?.stop(); } catch {}
      restartTimer.current = setTimeout(() => start(), 200);
    }
  }, [start]);

  return { listening, lang, setMicLang, start, stop, supported: !!SR, onFinalRef, onInterimRef, onStatusRef };
}

      if (!t) return;
      const el = document.createElement('div');
      if (/^🧠\s*THINK:|^\[THINK\]/i.test(t)) el.className = 'cot-think';
      else if (/^📋\s*PLAN:|^\[PLAN\]/i.test(t)) el.className = 'cot-plan';

      else if (/^📊\s*ANALYSIS:|^\[ANALYSIS\]/i.test(t)) el.className = 'cot-analysis';
      else if (/^🔄\s*NEXT:|^\[NEXT\]/i.test(t)) el.style.color = 'var(--mag)';
      else if (/^✅\s*DONE|^\[DONE\]/i.test(t)) el.className = 'cot-done';
      else if (/🔴|CRITICAL/i.test(t)) el.style.color = 'var(--red)';

      el.textContent = t;

    });

function RenderCoT({text}){

    if(/^🧠\s*THINK:|^\[THINK\]/i.test(t))return<div key={i} className="cot-think">{t}</div>;

    if(/^🔄\s*NEXT:|^\[NEXT\]/i.test(t))return<div key={i} style={{color:'var(--mag)'}}>{t}</div>;

  });

const AgentTab=({send,hasKey,setShowSettings,agentStatus,providerInfo,setShowTasks,chat,thinking,pending,socAlerts,autonomous,setAutonomous,voiceMode,setVoiceMode})=>{
  const[chatIn,setChatIn]=useState('');
  const cr=useRef(),inputRef=useRef();
  useEffect(()=>{if(cr.current)cr.current.scrollTop=cr.current.scrollHeight},[chat,thinking,pending,socAlerts]);
  const doSend=(ov)=>{const m=ov||chatIn.trim();if(!m)return;if(!hasKey){setShowSettings(true);return}setChatIn('');send('chat',{message:m})};
  const approve=(a)=>{if(pending)send('cmd_approve',{approve:a})};
  const toggleAuto=()=>{const n=!autonomous;setAutonomous(n);send('autonomous_toggle',{enabled:n})};
  const doExec=(cmd)=>send('exec_cmd',{cmd});

  const mic=useStableMic();
  // Wire the callbacks every render so they always see the latest `send` / state
  useEffect(()=>{
    mic.onFinalRef.current=(text)=>{
      if(!text){console.warn('[MIC] final fired with empty text');return;}
      console.log('[MIC] → sending to chat:', text);
      addCallChatMsg('user', text);
      send('chat',{message:text});
      setCallStatus('PROCESSING...');
      setTimeout(()=>setCallStatus(`LUCY IS LISTENING (${mic.lang})`),2000);

    return ()=>btns.forEach(b=>b.removeEventListener('click',handler));
  },[mic]);
  // Mute toggle — stops Web Speech and blocks PTT while muted.
  // Lives on window.__callMuted so the PTT handlers can gate on it.
  useEffect(()=>{
    const muteBtn=document.getElementById('callMuteBtn');
    const bigMic=document.getElementById('bigMicBtn');
    if(!muteBtn)return;
    window.__callMuted=!!window.__callMuted;
    const paint=()=>{
      const m=!!window.__callMuted;
      muteBtn.textContent=m?'🔇 MUTED':'🎤 MIC ON';
      muteBtn.setAttribute('aria-pressed',m?'true':'false');
      muteBtn.style.color=m?'var(--red)':'var(--green)';
      muteBtn.style.borderColor=m?'var(--red)':'var(--green)';
      muteBtn.style.background=m?'rgba(255,0,60,.12)':'rgba(57,255,20,.08)';
      muteBtn.style.boxShadow=m?'0 0 10px rgba(255,0,60,.35)':'0 0 10px rgba(57,255,20,.25)';
      if(bigMic){
        bigMic.style.opacity=m?'0.35':'';
        bigMic.style.filter=m?'grayscale(1)':'';
      }
    };
    const toggle=()=>{
      const next=!window.__callMuted;
      window.__callMuted=next;
      console.log('[MIC] mute →',next);
      if(next){
        // Going muted: stop continuous recognition + any in-flight PTT recording.
        try{mic.stop()}catch{}
        try{if(typeof pttStop==='function')pttStop(()=>{},()=>{});}catch{}
        setCallStatus('MUTED — click mic to unmute');
      }else{
        setCallStatus(`LUCY IS LISTENING (${mic.lang})`);
        // Only resume continuous Web Speech if PTT mode is OFF; otherwise PTT owns the mic.
        const pttBtn=document.getElementById('pttModeBtn');
        const pttOn=pttBtn&&/PTT ON/.test(pttBtn.textContent||'');
        if(!pttOn)mic.start();
      }
      paint();
    };
    muteBtn.addEventListener('click',toggle);
    paint();
    return ()=>muteBtn.removeEventListener('click',toggle);
  },[mic]);

  // Push-to-talk mode: when ON, use Whisper via /api/stt instead of Web Speech.
  // Press-and-hold the big mic button to record, release to transcribe + send.
  useEffect(()=>{
    const pttBtn=document.getElementById('pttModeBtn');

      pttBtn.style.borderColor=pttOn?'var(--cyan)':'var(--border)';
      bigMic.style.boxShadow=pttOn?'0 0 24px rgba(0,240,255,.5)':'';
      bigMic.title=pttOn?'Hold to record (Whisper)':'';
    };
    const pttToggle=()=>{
      pttOn=!pttOn;
      setBtn();
      if(pttOn){console.log('[STT] PTT mode ON — stopping Web Speech');mic.stop();setCallStatus('PTT mode — hold mic to talk');}
      else{console.log('[STT] PTT mode OFF — resuming Web Speech');mic.start();}
    };
    pttBtn.addEventListener('click',pttToggle);
    // Press-and-hold handlers on the big mic
    const finish=async()=>{
      await pttStop(
        (text)=>{
          console.log('[STT] → chat:',text);
          addCallChatMsg('user',text);
          send('chat',{message:text});
          setCallStatus('PROCESSING...');
        },
        (msg)=>setCallStatus(msg)
      );
      setTimeout(()=>setCallStatus(pttOn?'PTT mode — hold mic to talk':`LUCY IS LISTENING (${mic.lang})`),1800);
    };
    const begin=async(e)=>{
      if(!pttOn)return;
      if(window.__callMuted){setCallStatus('MUTED — click mic button to unmute');return;}
      e.preventDefault();
      await pttStart((msg)=>setCallStatus(msg));
    };
    const end=(e)=>{
      if(!pttOn)return;
      e.preventDefault();
      finish();
    };
    bigMic.addEventListener('mousedown',begin);
    bigMic.addEventListener('mouseup',end);
    bigMic.addEventListener('mouseleave',end);
    bigMic.addEventListener('touchstart',begin,{passive:false});
    bigMic.addEventListener('touchend',end);
    bigMic.addEventListener('touchcancel',end);
    setBtn();
    return ()=>{
      pttBtn.removeEventListener('click',pttToggle);
      bigMic.removeEventListener('mousedown',begin);
      bigMic.removeEventListener('mouseup',end);
      bigMic.removeEventListener('mouseleave',end);
      bigMic.removeEventListener('touchstart',begin);
      bigMic.removeEventListener('touchend',end);
      bigMic.removeEventListener('touchcancel',end);
    };

          <div style={{color:'var(--td)',fontSize:9,marginTop:3}}>Chat = Agent · {providerInfo.provider==='venice'?'Venice':providerInfo.provider==='gemini'?'Gemini':'Grok'} · UNRESTRICTED ACCESS</div>
        </div>
        <div style={{display:'flex',gap:5}}><button onClick={()=>{send('task_list');setShowTasks(true)}} style={{background:0,border:0,color:'var(--cyan)',fontSize:14,cursor:'pointer'}}>⊞</button><button onClick={()=>setShowSettings(true)} style={{background:0,border:0,color:'var(--td)',fontSize:14,cursor:'pointer'}}>⚙</button></div>
      </div>
      {!hasKey&&<div onClick={()=>setShowSettings(true)} style={{background:'#f5a62311',border:'1px solid #f5a62333',borderRadius:'var(--rad-md)',padding:'6px 10px',marginBottom:4,cursor:'pointer'}}><span style={{color:'var(--gold)',fontSize:9}}>⚠ API key needed</span></div>}
      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
        <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:9,color:autonomous?'var(--green)':'var(--td)',padding:'3px 8px',border:`1px solid ${autonomous?'var(--green)':'var(--border)'}`,borderRadius:'var(--rad-pill)'}} onClick={toggleAuto}>
          <span style={{width:6,height:6,borderRadius:'50%',background:autonomous?'var(--green)':'var(--tm)'}}></span>{autonomous?'AUTONOMOUS':'APPROVAL'}
        </label>
        {voiceSupported&&<label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:9,color:voiceMode?'var(--cyan)':'var(--td)',padding:'3px 8px',border:`1px solid ${voiceMode?'var(--cyan)':'var(--border)'}`,borderRadius:'var(--rad-pill)'}} onClick={toggleVoice}>
          <span style={{width:6,height:6,borderRadius:'50%',background:voiceMode?'var(--cyan)':'var(--tm)'}}></span>{voiceMode?'VOICE ON':'VOICE OFF'}
        </label>}
        {agentStatus.running&&<button className="btn s rd" onClick={()=>send('agent_abort')} style={{padding:'4px 10px'}}>ABORT</button>}
        <button className="btn s" onClick={()=>{stopSpeaking();send('clear_chat')}} style={{borderColor:'var(--tm)',color:'var(--tm)',marginLeft:'auto',padding:'4px 10px'}}>CLEAR</button>

      {pending&&!autonomous&&<div className="approval">

  const pick=(t)=>{setSel(t.id);setPreview(null);setChk([]);clearRedOut();setRunning(false);send('red_preview',{tactic:t.id})};
  const exec=()=>{if(!sel)return;clearRedOut();setRunning(true);send('red_execute',{tactic:sel,commandIndices:chk.length>0?chk:undefined})};
  return(<div style={{padding:'12px 16px 100px'}}><div style={{borderLeft:'2px solid var(--violet)',paddingLeft:12,marginBottom:10}}><span style={{color:'var(--violet-soft)',fontSize:13,fontFamily:'var(--fd)',letterSpacing:4}}>BLACK ICE</span><div style={{color:'var(--td)',fontSize:9,marginTop:4}}>MITRE ATT&CK · Real commands · Unrestricted Scope</div></div>
    <div style={{display:'flex',gap:8}}><div style={{width:'38%',display:'flex',flexDirection:'column',gap:3}}>{tactics.map(t=>(<button key={t.id} className={`tc ${sel===t.id?'a':''}`} onClick={()=>pick(t)} style={{padding:'7px 10px'}}><div style={{color:'var(--td)',fontSize:7}}>{t.mitre}</div><div style={{color:sel===t.id?'var(--violet-soft)':'var(--text)',fontSize:8,fontFamily:'var(--fd)',fontWeight:700}}>{t.name}</div><div style={{width:'100%',height:2,background:'var(--border)',marginTop:4,borderRadius:'var(--rad-pill)'}}><div style={{width:`${t.d}%`,height:'100%',background:t.d>80?'var(--green)':t.d>50?'var(--gold)':'var(--violet-soft)',borderRadius:'var(--rad-pill)'}}/></div></button>))}</div>
      <div style={{flex:1}}>{!preview&&redOut.length===0&&<div style={{textAlign:'center',padding:30,border:'1px dashed var(--border)',borderRadius:'var(--rad-md)',color:'var(--tm)',fontSize:10}}>SELECT TACTIC</div>}
        {preview&&<div><div style={{color:'var(--violet-soft)',fontSize:11,fontFamily:'var(--fd)',marginBottom:4}}>{preview.mitre} — {preview.name}</div><div style={{color:'var(--td)',fontSize:9,marginBottom:8}}>{preview.description}</div>{preview.commands.map(c=>(<label key={c.index} className="chk" onClick={()=>setChk(p=>p.includes(c.index)?p.filter(i=>i!==c.index):[...p,c.index])}><input type="checkbox" checked={chk.includes(c.index)} onChange={()=>{}}/><div><div style={{color:'var(--text)',fontSize:10}}>{c.label}</div><div style={{color:'var(--tm)',fontSize:8}}>{c.cmd.slice(0,55)}{c.cmd.length>55?'...':''}</div></div></label>))}<div style={{display:'flex',gap:6,marginTop:8}}><button className="btn s" onClick={exec} disabled={running}>{chk.length>0?`EXEC ${chk.length}`:'EXEC ALL'}</button><button className="btn s gn" onClick={()=>setChk(preview.commands.map(c=>c.index))}>ALL</button><button className="btn s" onClick={()=>setChk([])} style={{borderColor:'var(--td)',color:'var(--td)'}}>CLR</button></div></div>}
        {redOut.length>0&&<div style={{marginTop:8}}><Term lines={redOut}/></div>}
      </div>
    </div>
  </div>);
};

function App(){
  const{send,on,conn}=useWS();
  const[tab,setTab]=useState('home');const[time,setTime]=useState(new Date());const[status,setStatus]=useState({});
  const[scanTarget,setScanTarget]=useState('');const[scanMode,setScanMode]=useState('STANDARD');
  const[scanOut,setScanOut]=useState([]);const[scanning,setScanning]=useState(false);
  const[hardenOut,setHardenOut]=useState([]);const[hardening,setHardening]=useState(false);
  const[huntOut,setHuntOut]=useState([]);const[hunting,setHunting]=useState(false);
  const[redOut,setRedOut]=useState([]);const[redRunning,setRedRunning]=useState(false);const[redPreview,setRedPreview]=useState(null);
  const[showSettings,setShowSettings]=useState(false);const[showTasks,setShowTasks]=useState(false);const[tasks,setTasks]=useState([]);
  const[providerInfo,setProviderInfo]=useState({provider:'grok',grokHasKey:false,veniceHasKey:false,geminiHasKey:false});
  const[agentStatus,setAgentStatus]=useState({running:false,autonomous:false,round:0,pendingCmd:null});
  const[socStatus,setSocStatus]=useState({running:false,autoRespond:true,alertCount:0,cycle:0});
  const[chat,setChat]=useState([]);const[thinking,setThinking]=useState(false);const[pending,setPending]=useState(null);
  const[autonomous,setAutonomous]=useState(false);
  const[voiceMode,setVoiceMode]=useState(false);
  const[activeProvider,setActiveProvider]=useState(null);
  const[teamStatus,setTeamStatus]=useState({providers:{},healLog:[],primary:'grok'});
  const voiceModeRef=useRef(false);
  useEffect(()=>{voiceModeRef.current=voiceMode},[voiceMode]);

  useEffect(()=>{const iv=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(iv)},[]);
  useEffect(()=>{
    on('terminal',d=>{const l={text:d.text,type:d.type};if(d.channel==='scan')setScanOut(p=>[...p,l]);else if(d.channel==='harden')setHardenOut(p=>[...p,l]);else if(d.channel==='hunt')setHuntOut(p=>[...p,l]);else if(d.channel==='red')setRedOut(p=>[...p,l])});
    on('red_done',()=>setRedRunning(false));
    on('provider_status',d=>setProviderInfo(d));on('key_saved',()=>send('get_provider'));
    on('status',d=>setStatus(d));on('task_list',d=>setTasks(d));
    on('task_registered',()=>send('task_list'));on('task_completed',()=>send('task_list'));on('task_killed',()=>send('task_list'));
    on('agent_status',d=>{setAgentStatus(d);if(d.autonomous!==undefined)setAutonomous(d.autonomous);if(d.voiceMode!==undefined)setVoiceMode(d.voiceMode);if(!d.running){setThinking(false);setPending(null)}});
    on('soc_status',d=>setSocStatus(d));
    on('chat_message',d=>{
      setChat(p=>[...p,d]);setThinking(false);
      if(d.role==='assistant'&&window.__latencyStart){
        const ms=Date.now()-window.__latencyStart;window.__latencyStart=0;
        const pill=document.getElementById('callLatencyPill');
        if(pill){pill.textContent=`${ms}ms`;pill.style.display='inline';}
      }
      if(voiceModeRef.current){if(d.role==='assistant'){addCallChatMsg('assistant',d.content);if(d.meta!=='tool')speak(d.content);}else if(d.role==='system'){addCallChatMsg('system',d.content);}}
    });
    on('chat_history',d=>setChat(d.map(h=>({role:h.role,content:h.content,meta:h.meta}))));
    on('chat_cleared',()=>{setChat([]);const cc=document.getElementById('callChat');if(cc)cc.innerHTML=''});
    on('team_status',d=>setTeamStatus(d));
    on('team_heal',d=>{
      setTeamStatus(prev=>({...prev,healLog:[...(prev.healLog||[]),d].slice(-8)}));
      setChat(p=>[...p,{role:'system',content:`🛠 TEAM [${d.provider.toUpperCase()}] ${d.issue} → ${d.action}`,meta:'team'}]);
    });
    on('active_provider',d=>{
      setActiveProvider(d);
      const badge=document.getElementById('callProviderBadge');
      if(badge){const labels={grok:'⚡ GROK-3',venice:'🔮 VENICE',gemini:'✨ GEMINI'};badge.textContent=labels[d.provider]||d.provider.toUpperCase();badge.className='provider-badge '+(d.provider||'grok');}
    });
    on('chat_thinking',d=>{
      window.__latencyStart=Date.now();
      setThinking(true);
      if(voiceModeRef.current){const r=d?.round;addCallChatMsg('system',r?`\u{1F9E0} Lucy is thinking... (round ${r})`:'\u{1F9E0} Lucy is thinking...');setCallStatus(r?`LUCY IS THINKING — round ${r}`:'LUCY IS THINKING');}
    });
    on('cmd_pending',d=>{setPending(d);setThinking(false)});
    on('cmd_executing',()=>setPending(null));
    on('cmd_result',d=>{setChat(p=>[...p,{role:'system',content:`${d.ok?'✓':'✗'} ${d.cmd}\n${d.output}`,meta:d.ok?'result':'error'}]);if(voiceModeRef.current){addCallChatMsg('system',`${d.ok?'✓':'✗'} ${d.cmd}`)}});
    on('soc_alert',d=>{setChat(p=>[...p,{role:'system',content:`🛡 SOC [${d.severity}] ${d.type}\n${d.detail}`,meta:'soc'}]);setSocStatus(s=>({...s,alertCount:s.alertCount+1}))});
    on('soc_response',d=>{setChat(p=>[...p,{role:'system',content:`🛡 SOC AUTO-RESPONSE: ${d.actions.join(' | ')}`,meta:'soc'}])});
    on('red_preview',d=>setRedPreview(d));
  },[on,send]);
  useEffect(()=>{if(conn){send('get_provider');send('get_status');send('task_list');send('get_chat_history');send('get_team_status');}},[conn,send]);
  useEffect(()=>{const l=scanOut[scanOut.length-1];if(l?.text?.includes('complete'))setScanning(false)},[scanOut]);
  useEffect(()=>{const l=hardenOut[hardenOut.length-1];if(l?.text?.includes('complete'))setHardening(false)},[hardenOut]);
  useEffect(()=>{const l=huntOut[huntOut.length-1];if(l?.text?.includes('complete'))setHunting(false)},[huntOut]);

  const hasKey=providerInfo.provider==='venice'?providerInfo.veniceHasKey:providerInfo.provider==='gemini'?providerInfo.geminiHasKey:providerInfo.grokHasKey;
  const doScan=()=>{if(!scanTarget.trim())return;setScanning(true);setScanOut([]);send('scan',{target:scanTarget.trim(),mode:scanMode})};
  const doHarden=()=>{setHardening(true);setHardenOut([]);send('harden')};
  const doHunt=()=>{setHunting(true);setHuntOut([]);send('hunt')};

  return(<div>
    {showSettings&&<SettingsModal {...providerInfo} setShowSettings={setShowSettings} send={send} socRunning={socStatus.running} socAutoRespond={socStatus.autoRespond}/>}
    {showTasks&&<TaskModal setShowTasks={setShowTasks} tasks={tasks} send={send}/>}
    <div className="topbar">
      <span className="logo">pb<span className="at">@</span>v5</span>
      <div className="pill-row">
        {agentStatus.running&&<span className="pill mg pulse"><span className="dot" style={{background:'var(--mag)'}}></span>R{agentStatus.round}</span>}
        {voiceSupported&&<span className={`pill ${voiceMode?'cy':''} click`} onClick={()=>{const n=!voiceMode;setVoiceMode(n);send('voice_mode_toggle',{enabled:n});if(!n){stopSpeaking()}}} title="Voice mode (STT + TTS)"><span className="dot" style={{background:voiceMode?'var(--cyan)':'var(--tm)'}}></span>🎙 {voiceMode?'ON':'OFF'}</span>}
        {(()=>{const ps=teamStatus?.providers||{};const keys=['grok','venice','gemini'];const anyKey=keys.some(n=>ps[n]?.hasKey);const allOk=keys.every(n=>!ps[n]?.hasKey||ps[n]?.healthy!==false);return(<span className={`pill ${anyKey?(allOk?'on':'off'):''}`} title="AI Team health"><span className="dot" style={{background:anyKey?(allOk?'var(--green)':'var(--red)'):'var(--tm)'}}></span>TEAM</span>);})()}
        <span className={`pill ${socStatus.running?'soc-on':'soc-off'}`}>🛡 {socStatus.running?`SOC·${socStatus.alertCount}`:'SOC OFF'}</span>
        <span className={`pill ${activeProvider?.provider==='venice'?'mg':activeProvider?.provider==='gemini'?'cy':'vio'}`} title={activeProvider?`task: ${activeProvider.task}`:''}>
          {activeProvider?{grok:'⚡ GROK',venice:'🔮 VEN',gemini:'✨ GEM'}[activeProvider.provider]||activeProvider.provider.toUpperCase():(providerInfo.provider==='venice'?'🔮 VEN':providerInfo.provider==='gemini'?'✨ GEM':'⚡ GROK')}
        </span>
        <span className="pill cy click" onClick={()=>{send('task_list');setShowTasks(true)}}>⊞{tasks.filter(t=>t.status==='running').length}</span>
        <span className={`pill ${conn?'on':'off'}`}><span className="dot" style={{background:conn?'var(--green)':'var(--red)'}}></span>{conn?'UP':'DOWN'}</span>
        <span className="pill clock">{time.toLocaleTimeString()}</span>
      </div>
    </div>
    {tab==='home'&&<Home status={status} agentStatus={agentStatus} socStatus={socStatus} tasks={tasks} setTab={setTab} setShowSettings={setShowSettings} setShowTasks={setShowTasks} provider={providerInfo.provider} teamStatus={teamStatus}/>}
    {tab==='scan'&&<Scan scanMode={scanMode} setScanMode={setScanMode} scanTarget={scanTarget} setScanTarget={setScanTarget} doScan={doScan} scanning={scanning} scanOut={scanOut}/>}
    {tab==='harden'&&<Harden hardenOut={hardenOut} hardening={hardening} doHarden={doHarden}/>}
    {tab==='hunt'&&<Hunt huntOut={huntOut} hunting={hunting} doHunt={doHunt}/>}
    {tab==='agent'&&<AgentTab send={send} hasKey={hasKey} setShowSettings={setShowSettings} agentStatus={agentStatus} providerInfo={providerInfo} setShowTasks={setShowTasks} chat={chat} thinking={thinking} pending={pending} socAlerts={[]} autonomous={autonomous} setAutonomous={setAutonomous} voiceMode={voiceMode} setVoiceMode={setVoiceMode}/>}
    {tab==='red'&&<RedTab send={send} redOut={redOut} preview={redPreview} setPreview={setRedPreview} clearRedOut={()=>setRedOut([])} running={redRunning} setRunning={setRedRunning}/>}
    <div className="tbar">
      {[{id:'home',i:'>_',l:'DECK'},{id:'scan',i:'((◉))',l:'RECON'},{id:'harden',i:'◇',l:'FORT'},{id:'hunt',i:'◎',l:'GHOST'},{id:'agent',i:'⬡',l:'AI'},{id:'red',i:'⚡',l:'ICE'}].map(t=>(<button key={t.id} className={`tbtn ${tab===t.id?'a':''}`} onClick={()=>setTab(t.id)}><span className="i">{t.i}</span><span className="l">{t.l}</span>{tab===t.id&&<div style={{width:16,height:2,background:'var(--violet-soft)',borderRadius:'var(--rad-pill)',marginTop:2}}/>}</button>))}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
