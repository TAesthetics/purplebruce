<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Purple Bruce v4.2 вҖ” Cyberdeck</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --void:#050312;--bg:#0a0618;--surface:rgba(18,11,32,.72);--card:rgba(24,16,42,.65);--border:rgba(127,0,255,.22);
  --violet:#7F00FF;--violet-deep:#6B00B0;--violet-soft:#9a4dff;--vg:#7f00ff66;--vg-strong:#7f00ffcc;
  --red:#ff2d55;--rg:#ff2d5588;
  --cyan:#00f0ff;--cg:#00f0ff55;
  --mag:#ff2d95;--gold:#ffb347;--green:#39ff14;--purple:#a78bfa;
  --text:#e4dff5;--tb:#f6f1ff;--td:#8a82a8;--tm:#46405f;
  --f:'Share Tech Mono','Courier New',monospace;--fd:'Orbitron','Share Tech Mono',monospace;
  --rad-pill:999px;--rad-lg:18px;--rad-md:14px;--rad-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(127,0,255,.18),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(0,240,255,.10),transparent 60%),
    radial-gradient(700px 400px at 50% 120%,rgba(255,45,149,.08),transparent 65%),
    var(--bg);
  color:var(--text);font-family:var(--f);overflow-x:hidden;min-height:100vh;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--violet),var(--violet-deep));border-radius:var(--rad-pill)}
input,textarea,select{font-family:var(--f)}input::placeholder{color:var(--tm)}
.crt{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--vg),inset 0 0 20px rgba(127,0,255,.12)}50%{box-shadow:0 0 34px var(--vg-strong),inset 0 0 28px rgba(127,0,255,.22)}}
.pulse{animation:pulse 2s infinite}
.glow{animation:glow 3s ease-in-out infinite}

/* в”Җв”Җв”Җ TOP BAR в”Җв”Җв”Җ */
.topbar{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);
  background:linear-gradient(180deg,rgba(10,6,24,.85),rgba(10,6,24,.55));
  border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
}
.logo{
  font-family:var(--fd);font-weight:900;letter-spacing:2px;font-size:20px;
  background:linear-gradient(90deg,var(--violet-soft),var(--violet),var(--mag));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 24px var(--vg);
}
.logo .at{color:var(--cyan);-webkit-text-fill-color:var(--cyan);text-shadow:0 0 10px var(--cg);font-weight:700}
.pill-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 13px;border-radius:var(--rad-pill);
  border:1px solid var(--border);
  background:rgba(20,14,34,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-size:11px;font-family:var(--fd);letter-spacing:1.5px;color:var(--text);font-weight:700;
  cursor:default;white-space:nowrap;
}
.pill.click{cursor:pointer;transition:.2s}
.pill.click:hover{border-color:var(--violet);box-shadow:0 0 14px var(--vg);transform:translateY(-1px)}
.pill .dot{width:8px;height:8px;border-radius:50%;display:inline-block;box-shadow:0 0 10px currentColor}
.pill.on{color:var(--green);border-color:rgba(57,255,20,.35)}
.pill.off{color:var(--red);border-color:rgba(255,45,85,.4)}
.pill.vio{color:var(--violet-soft);border-color:rgba(127,0,255,.45);box-shadow:0 0 12px rgba(127,0,255,.18)}
.pill.cy{color:var(--cyan);border-color:rgba(0,240,255,.35)}
.pill.mg{color:var(--mag);border-color:rgba(255,45,149,.35)}
.pill.clock{color:var(--tb);font-variant-numeric:tabular-nums;font-size:12px;letter-spacing:2px}

/* в”Җв”Җв”Җ BOTTOM NAV в”Җв”Җв”Җ */
.tbar{
  position:fixed;bottom:12px;left:12px;right:12px;z-index:100;
  background:rgba(10,6,24,.75);backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);
  border:1px solid var(--border);border-radius:var(--rad-pill);
  display:flex;padding:8px;gap:4px;
  box-shadow:0 8px 40px rgba(127,0,255,.18),0 0 0 1px rgba(127,0,255,.06);
}
.tbtn{
  flex:1;background:0;border:0;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:9px 2px;border-radius:var(--rad-pill);transition:.2s;
}
.tbtn .i{font-size:16px;transition:.2s}
.tbtn .l{font-size:8px;font-family:var(--fd);letter-spacing:2px;font-weight:700}
.tbtn.a{background:linear-gradient(180deg,rgba(127,0,255,.25),rgba(107,0,176,.12));box-shadow:0 0 18px var(--vg),inset 0 0 14px rgba(127,0,255,.18)}
.tbtn.a .i{color:var(--violet-soft);text-shadow:0 0 10px var(--vg-strong)}
.tbtn.a .l{color:var(--violet-soft)}
.tbtn:not(.a) .i,.tbtn:not(.a) .l{color:var(--tm)}
.tbtn:not(.a):hover{background:rgba(127,0,255,.08)}

/* в”Җв”Җв”Җ BUTTONS в”Җв”Җв”Җ */
.btn{
  background:linear-gradient(180deg,rgba(127,0,255,.18),rgba(107,0,176,.08));
  border:1px solid var(--violet);border-radius:var(--rad-pill);
  padding:12px 22px;color:var(--violet-soft);
  font-size:11px;font-weight:700;font-family:var(--fd);letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;
  box-shadow:0 0 18px var(--vg),inset 0 0 12px rgba(127,0,255,.1);
  transition:transform .15s,box-shadow .2s,border-color .2s;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 28px var(--vg-strong),inset 0 0 16px rgba(127,0,255,.22)}
.btn:active{transform:translateY(0)}
.btn:disabled{border-color:var(--tm);color:var(--tm);box-shadow:none;background:rgba(70,64,95,.12);cursor:default;transform:none}
.btn.s{padding:8px 14px;font-size:9px;letter-spacing:2px}
.btn.cy{border-color:var(--cyan);color:var(--cyan);background:linear-gradient(180deg,rgba(0,240,255,.15),rgba(0,240,255,.04));box-shadow:0 0 16px var(--cg)}
.btn.mg{border-color:var(--mag);color:var(--mag);background:linear-gradient(180deg,rgba(255,45,149,.16),rgba(255,45,149,.04));box-shadow:0 0 16px rgba(255,45,149,.35)}
.btn.gn{border-color:var(--green);color:var(--green);background:linear-gradient(180deg,rgba(57,255,20,.14),rgba(57,255,20,.04));box-shadow:0 0 16px rgba(57,255,20,.3)}
.btn.rd{border-color:var(--red);color:var(--red);background:linear-gradient(180deg,rgba(255,45,85,.16),rgba(255,45,85,.04));box-shadow:0 0 16px var(--rg)}

/* в”Җв”Җв”Җ INPUTS в”Җв”Җв”Җ */
.inp{
  width:100%;background:rgba(5,3,18,.7);border:1px solid var(--border);border-radius:var(--rad-md);
  padding:12px 16px;color:var(--text);font-size:12px;outline:0;transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(127,0,255,.18)}

/* в”Җв”Җв”Җ TERMINAL в”Җв”Җв”Җ */
.tout{
  background:rgba(5,3,18,.75);border:1px solid var(--border);border-radius:var(--rad-lg);
  padding:14px 16px;max-height:500px;overflow-y:auto;font-size:11px;line-height:1.7;
  box-shadow:inset 0 0 24px rgba(127,0,255,.06);
}
.tl{white-space:pre-wrap;word-break:break-word}
.tl.stdout{color:var(--td)}.tl.stderr,.tl.warn{color:var(--gold)}.tl.error{color:var(--red)}
.tl.info{color:var(--cyan)}.tl.cmd{color:var(--tb);font-weight:700;text-shadow:0 0 6px rgba(246,241,255,.25)}
.tl.next{color:var(--mag)}

/* в”Җв”Җв”Җ CHAT BUBBLES в”Җв”Җв”Җ */
.cb{max-width:85%;border-radius:var(--rad-lg);padding:10px 14px;backdrop-filter:blur(6px)}
.cb.user{align-self:flex-end;background:linear-gradient(135deg,rgba(127,0,255,.22),rgba(107,0,176,.12));border:1px solid rgba(127,0,255,.45);box-shadow:0 4px 20px rgba(127,0,255,.18)}
.cb.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.3)}

/* в”Җв”Җв”Җ MODE PILLS в”Җв”Җв”Җ */
.md{
  flex:1;background:rgba(20,14,34,.5);border:1px solid var(--border);border-radius:var(--rad-pill);
  padding:9px 8px;color:var(--td);font-size:9px;font-family:var(--fd);letter-spacing:1.5px;cursor:pointer;
  font-weight:700;transition:.2s;
}
.md.a{background:linear-gradient(180deg,rgba(127,0,255,.28),rgba(107,0,176,.12));border-color:var(--violet);color:var(--violet-soft);box-shadow:0 0 14px var(--vg)}

/* в”Җв”Җв”Җ TACTIC CARDS в”Җв”Җв”Җ */
.tc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--rad-md);
  padding:10px 12px;cursor:pointer;text-align:left;width:100%;transition:.2s;
  backdrop-filter:blur(6px);
}
.tc:hover{border-color:rgba(127,0,255,.5);box-shadow:0 4px 16px rgba(127,0,255,.15)}
.tc.a{background:linear-gradient(135deg,rgba(127,0,255,.22),rgba(255,45,149,.08));border-color:var(--violet);box-shadow:0 0 16px var(--vg)}

/* в”Җв”Җв”Җ MODAL в”Җв”Җв”Җ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(2,1,8,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--surface);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);
  border:1px solid var(--border);border-radius:var(--rad-lg);
  padding:26px;width:100%;max-width:520px;max-height:82vh;overflow-y:auto;
  box-shadow:0 20px 80px rgba(127,0,255,.22),0 0 0 1px rgba(127,0,255,.08);
}

/* в”Җв”Җв”Җ CHECKBOX ROW в”Җв”Җв”Җ */
.chk{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--rad-md);
  margin-bottom:6px;cursor:pointer;font-size:11px;transition:.2s;
}
.chk:hover{border-color:var(--violet);background:rgba(127,0,255,.06)}
.chk input{accent-color:var(--violet);width:16px;height:16px}

/* в”Җв”Җв”Җ PANEL в”Җв”Җв”Җ */
.panel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--rad-lg);
  padding:16px 18px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 4px 24px rgba(0,0,0,.25);
}

@media(max-width:420px){
  .logo{font-size:18px;letter-spacing:1.5px}
  .pill{font-size:10px;padding:6px 11px}
  .pill.clock{font-size:11px}
}
</style>
</head>
<body>
<div class="crt"></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useWS() {
  const ws = useRef(null), handlers = useRef({}), [conn, setConn] = useState(false);
  const connect = useCallback(() => {
    const w = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`);
    w.onopen = () => { setConn(true); ws.current = w; };
    w.onclose = () => { setConn(false); ws.current = null; setTimeout(connect, 2000); };
    w.onmessage = e => { try { const m = JSON.parse(e.data); handlers.current[m.type]?.(m.data, m.channel); } catch {} };
  }, []);
  useEffect(() => { connect(); return () => ws.current?.close(); }, [connect]);
  const send = useCallback((a, d = {}) => { if (ws.current?.readyState === 1) ws.current.send(JSON.stringify({ action: a, ...d })); }, []);
  const on = useCallback((t, h) => { handlers.current[t] = h; }, []);
  return { send, on, conn };
}

function Term({ lines, mh = 500 }) {
  const r = useRef();
  useEffect(() => { if (r.current) r.current.scrollTop = r.current.scrollHeight; }, [lines]);
  return (
    <div ref={r} className="tout" style={{ maxHeight: mh, marginTop: 10 }}>
      {lines.map((l, i) => <div key={i} className={`tl ${l.type || 'stdout'}`}>{l.text}</div>)}
      <span style={{ color: 'var(--cyan)', opacity: .6, animation: 'blink 1s infinite' }}>в–Ҳ</span>
    </div>
  );
}

// в•җв•җв•җ SETTINGS MODAL в•җв•җв•җ
const SettingsModal = ({ provider, grokHasKey, grokMask, veniceHasKey, veniceMask, setShowSettings, send }) => {
  const [grokKeyIn, setGrokKeyIn] = useState('');
  const [veniceKeyIn, setVeniceKeyIn] = useState('');
  return (
    <div className="modal-overlay">
      <div className="modal" style={{ border: '1px solid var(--cyan)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <span style={{ color: 'var(--cyan)', fontSize: 14, fontFamily: 'var(--fd)', letterSpacing: 3 }}>SETTINGS</span>
          <button className="btn s" onClick={() => setShowSettings(false)} style={{ borderColor: 'var(--td)', color: 'var(--td)' }}>CLOSE</button>
        </div>

        <div style={{ color: 'var(--td)', fontSize: 10, marginBottom: 12 }}>AI PROVIDER</div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
          <button className={`btn s ${provider === 'grok' ? 'gn' : ''}`} onClick={() => send('set_provider', { provider: 'grok' })} style={provider !== 'grok' ? { borderColor: 'var(--td)', color: 'var(--td)' } : {}}>GROK 3</button>
          <button className={`btn s ${provider === 'venice' ? 'mg' : ''}`} onClick={() => send('set_provider', { provider: 'venice' })} style={provider !== 'venice' ? { borderColor: 'var(--td)', color: 'var(--td)' } : {}}>VENICE.AI</button>
        </div>

        <div style={{ color: 'var(--td)', fontSize: 10, marginBottom: 6 }}>GROK API KEY (x.ai)</div>
        {grokHasKey && <div style={{ color: 'var(--green)', fontSize: 10, marginBottom: 4 }}>вң“ {grokMask}</div>}
        <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
          <input value={grokKeyIn} onChange={e => setGrokKeyIn(e.target.value)} placeholder="xai-..." type="password" className="inp" style={{ flex: 1 }} />
          <button className="btn s gn" onClick={() => { if (grokKeyIn.trim()) { send('set_key', { key: grokKeyIn.trim(), provider: 'grok' }); setGrokKeyIn(''); } }}>SAVE</button>
        </div>

        <div style={{ color: 'var(--td)', fontSize: 10, marginBottom: 6 }}>VENICE.AI API KEY</div>
        {veniceHasKey && <div style={{ color: 'var(--green)', fontSize: 10, marginBottom: 4 }}>вң“ {veniceMask}</div>}
        <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
          <input value={veniceKeyIn} onChange={e => setVeniceKeyIn(e.target.value)} placeholder="venice-..." type="password" className="inp" style={{ flex: 1 }} />
          <button className="btn s mg" onClick={() => { if (veniceKeyIn.trim()) { send('set_key', { key: veniceKeyIn.trim(), provider: 'venice' }); setVeniceKeyIn(''); } }}>SAVE</button>
        </div>

        <div style={{ color: 'var(--tm)', fontSize: 9, marginTop: 8 }}>Active: {provider === 'venice' ? 'Venice.ai (llama-3.3-70b)' : 'Grok 3 mini (xAI)'}</div>
      </div>
    </div>
  );
};

// в•җв•җв•җ TASK MODAL в•җв•җв•җ
const TaskModal = ({ setShowTasks, tasks, send }) => {
  return (
    <div className="modal-overlay">
      <div className="modal" style={{ border: '1px solid var(--cyan)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <span style={{ color: 'var(--cyan)', fontSize: 14, fontFamily: 'var(--fd)', letterSpacing: 3 }}>TASK MANAGER</span>
          <button className="btn s" onClick={() => setShowTasks(false)} style={{ borderColor: 'var(--td)', color: 'var(--td)' }}>CLOSE</button>
        </div>
        <button className="btn s cy" onClick={() => send('task_list')} style={{ marginBottom: 12 }}>REFRESH</button>
        {tasks.length === 0 ? <div style={{ color: 'var(--tm)', fontSize: 12, padding: 20, textAlign: 'center' }}>No tasks</div> :
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {tasks.map(t => (
              <div key={t.id} style={{ background: 'var(--card)', border: `1px solid ${t.status === 'running' ? 'var(--green)' : t.status === 'killed' ? 'var(--red)' : 'var(--border)'}`, borderRadius: 'var(--rad-md)', padding: '8px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ color: t.status === 'running' ? 'var(--green)' : 'var(--td)', fontSize: 11, fontFamily: 'var(--fd)' }}>{t.type.toUpperCase()}</div>
                  <div style={{ color: 'var(--text)', fontSize: 10, marginTop: 2 }}>{t.label}</div>
                  <div style={{ color: 'var(--tm)', fontSize: 9, marginTop: 2 }}>{t.id} | {t.status}</div>
                </div>
                {t.status === 'running' && t.alive && <button className="btn s" onClick={() => send('task_kill', { id: t.id })}>KILL</button>}
              </div>
            ))}
          </div>}
      </div>
    </div>
  );
};

// в•җв•җв•җ HOME в•җв•җв•җ
const Home = ({ status, autoRun, autoRound, autoMode, tasks, setTab, setShowSettings, setShowTasks, provider }) => {
  return (
    <div style={{ padding: '12px 16px 100px' }}>
      <div style={{ textAlign: 'center', marginBottom: 16 }}>
        <pre style={{ color: 'var(--violet-soft)', fontSize: 6.5, lineHeight: 1.05, textShadow: '0 0 12px var(--vg-strong)', whiteSpace: 'pre', margin: 0 }}>{`в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ
в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв•қ

                  {checkedCmds.length > 0 ? `EXECUTE ${checkedCmds.length} SELECTED` : 'EXECUTE ALL'}
                </button>
                <button className="btn s gn" onClick={() => { setCheckedCmds(preview.commands.map(c => c.index)); }}>SELECT ALL</button>
                <button className="btn s" onClick={() => setCheckedCmds([])} style={{ borderColor: 'var(--td)', color: 'var(--td)' }}>CLEAR</button>
              </div>
            </div>
          )}
          {redOut.length > 0 && <div style={{ marginTop: 10 }}><Term lines={redOut} /></div>}
        </div>
      </div>
    </div>
  );
};

// в•җв•җв•җ APP в•җв•җв•җ
function App() {
  const { send, on, conn } = useWS();
  const [tab, setTab] = useState('home');
  const [time, setTime] = useState(new Date());
  const [status, setStatus] = useState({});
  const [scanTarget, setScanTarget] = useState('');
  const [scanMode, setScanMode] = useState('STANDARD');
  const [scanOut, setScanOut] = useState([]);
  const [scanning, setScanning] = useState(false);
  const [hardenOut, setHardenOut] = useState([]);
  const [hardening, setHardening] = useState(false);
  const [huntOut, setHuntOut] = useState([]);
  const [hunting, setHunting] = useState(false);
  const [chat, setChat] = useState([]);
  const [chatIn, setChatIn] = useState('');
  const [chatLoad, setChatLoad] = useState(false);
  const [autoRun, setAutoRun] = useState(false);
  const [autoRound, setAutoRound] = useState(0);
  const [autoMax, setAutoMax] = useState(0);
  const [autoOut, setAutoOut] = useState([]);
  const [pendingCmd, setPendingCmd] = useState(null);
  const [autoMode, setAutoMode] = useState(false);
  const [redOut, setRedOut] = useState([]);
  const [redRunning, setRedRunning] = useState(false);
  const [execOut, setExecOut] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [tasks, setTasks] = useState([]);
  const [showTasks, setShowTasks] = useState(false);
  const [providerInfo, setProviderInfo] = useState({ provider: 'grok', grokHasKey: false, veniceHasKey: false });
  const [redPreview, setRedPreview] = useState(null);

  useEffect(() => { const iv = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(iv); }, []);

  useEffect(() => {
    on('terminal', (d) => {
      const l = { text: d.text, type: d.type };
      if (d.channel === 'scan') setScanOut(p => [...p, l]);
      else if (d.channel === 'harden') setHardenOut(p => [...p, l]);
      else if (d.channel === 'hunt') setHuntOut(p => [...p, l]);
      else if (d.channel === 'red') setRedOut(p => [...p, l]);
      else if (d.channel === 'chat') setExecOut(p => [...p, l]);
    });
    on('red_done', () => setRedRunning(false));
    on('chat_response', d => { setChat(p => [...p, d]); setChatLoad(false); });
    on('chat_history', d => setChat(d.map(h => ({ role: h.role, content: h.content }))));
    on('chat_cleared', () => setChat([]));
    on('agent_status', d => { setAutoRun(d.running); setAutoRound(d.round); if (d.maxRounds !== undefined) setAutoMax(d.maxRounds); if (d.autonomous !== undefined) setAutoMode(d.autonomous); });
    on('agent_line', d => setAutoOut(p => [...p, d]));
    on('agent_pending_cmd', d => setPendingCmd(d));
    on('provider_status', d => setProviderInfo(d));
    on('key_saved', d => { send('get_provider'); });
    on('key_status', d => {});
    on('status', d => setStatus(d));
    on('task_list', d => setTasks(d));
    on('task_registered', () => send('task_list'));
    on('task_completed', () => send('task_list'));
    on('task_killed', () => send('task_list'));
    on('red_preview', d => setRedPreview(d));
  }, [on, send]);

  useEffect(() => { if (conn) { send('get_provider'); send('get_status'); send('get_chat_history'); send('task_list'); } }, [conn, send]);
  useEffect(() => { const l = scanOut[scanOut.length - 1]; if (l?.text?.includes('complete')) setScanning(false); }, [scanOut]);
  useEffect(() => { const l = hardenOut[hardenOut.length - 1]; if (l?.text?.includes('complete')) setHardening(false); }, [hardenOut]);
  useEffect(() => { const l = huntOut[huntOut.length - 1]; if (l?.text?.includes('complete')) setHunting(false); }, [huntOut]);
  useEffect(() => { const l = redOut[redOut.length - 1]; if (l?.text?.includes('complete')) { /* keep terminal open */ } }, [redOut]);

  const hasKey = providerInfo.provider === 'venice' ? providerInfo.veniceHasKey : providerInfo.grokHasKey;
  const doScan = () => { if (!scanTarget.trim()) return; setScanning(true); setScanOut([]); send('scan', { target: scanTarget.trim(), mode: scanMode }); };
  const doHarden = () => { setHardening(true); setHardenOut([]); send('harden'); };
  const doHunt = () => { setHunting(true); setHuntOut([]); send('hunt'); };
  const doChat = (ov) => { const m = ov || chatIn.trim(); if (!m) return; if (!hasKey) { setShowSettings(true); return; } setChatLoad(true); setChat(p => [...p, { role: 'user', content: m }]); if (!ov) setChatIn(''); send('chat', { message: m }); };
  const doExec = (cmd) => send('exec_cmd', { cmd, channel: 'chat' });
  const startAuto = () => { if (!hasKey) { setShowSettings(true); return; } setAutoOut([]); send('agent_start', { rounds: autoMax, autonomous: autoMode }); };
  const stopAuto = () => send('agent_stop');
  const approve = (a) => { if (pendingCmd) { send('agent_approve', { round: pendingCmd.round, approve: a }); setPendingCmd(null); } };

  return (
    <div>
      {showSettings && <SettingsModal {...providerInfo} setShowSettings={setShowSettings} send={send} />}
      {showTasks && <TaskModal setShowTasks={setShowTasks} tasks={tasks} send={send} />}
      <div className="topbar">
        <span className="logo">pb<span className="at">@</span>v4.2</span>
        <div className="pill-row">
          {autoRun && <span className="pill mg pulse"><span className="dot" style={{ background: 'var(--mag)' }}></span>R{autoRound} {autoMode ? 'AUTO' : 'APR'}</span>}
          <span className="pill vio">{providerInfo.provider === 'venice' ? 'VENICE' : 'GROK'}</span>
          <span className="pill cy click" onClick={() => { send('task_list'); setShowTasks(true); }}>вҠһ {tasks.filter(t => t.status === 'running').length}</span>
          <span className={`pill ${conn ? 'on' : 'off'}`}><span className="dot" style={{ background: conn ? 'var(--green)' : 'var(--red)' }}></span>{conn ? 'LINK' : 'DOWN'}</span>
          <span className="pill clock">{time.toLocaleTimeString()}</span>
        </div>
      </div>
      {tab === 'home' && <Home status={status} autoRun={autoRun} autoRound={autoRound} autoMode={autoMode} tasks={tasks} setTab={setTab} setShowSettings={setShowSettings} setShowTasks={setShowTasks} provider={providerInfo.provider} />}
      {tab === 'scan' && <Scan scanMode={scanMode} setScanMode={setScanMode} scanTarget={scanTarget} setScanTarget={setScanTarget} doScan={doScan} scanning={scanning} scanOut={scanOut} />}
      {tab === 'harden' && <Harden hardenOut={hardenOut} hardening={hardening} doHarden={doHarden} />}
      {tab === 'hunt' && <Hunt huntOut={huntOut} hunting={hunting} doHunt={doHunt} />}
      {tab === 'agent' && <AgentTab hasKey={hasKey} setShowSettings={setShowSettings} autoRun={autoRun} stopAuto={stopAuto} startAuto={startAuto} autoMax={autoMax} setAutoMax={setAutoMax} autoMode={autoMode} setAutoMode={setAutoMode} autoRound={autoRound} pendingCmd={pendingCmd} approve={approve} autoOut={autoOut} chat={chat} chatLoad={chatLoad} doChat={doChat} chatIn={chatIn} setChatIn={setChatIn} doExec={doExec} send={send} setShowTasks={setShowTasks} provider={providerInfo.provider} execOut={execOut} clearExecOut={() => setExecOut([])} />}
      {tab === 'red' && <RedTab send={send} redOut={redOut} preview={redPreview} setPreview={setRedPreview} clearRedOut={() => setRedOut([])} running={redRunning} setRunning={setRedRunning} />}
      <div className="tbar">
        {[{ id: 'home', i: '>_', l: 'DECK' }, { id: 'scan', i: '((в—ү))', l: 'RECON' }, { id: 'harden', i: 'в—Ү', l: 'FORT' }, { id: 'hunt', i: 'в—Һ', l: 'GHOST' }, { id: 'agent', i: 'в¬Ў', l: 'AI' }, { id: 'red', i: 'вҡЎ', l: 'ICE' }].map(t => (
          <button key={t.id} className={`tbtn ${tab === t.id ? 'a' : ''}`} onClick={() => setTab(t.id)}>
            <span className="i">{t.i}</span><span className="l">{t.l}</span>
            {tab === t.id && <div style={{ width: 18, height: 3, background: 'var(--violet-soft)', borderRadius: 'var(--rad-pill)', marginTop: 2, boxShadow: '0 0 8px var(--vg-strong)' }} />}
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
