# tmux · Netrunner cyberpunk theme — palette 201/129/51/226 on deep-black.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0

# Prefix → Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Pane borders
set -g pane-border-style        'fg=colour129'
set -g pane-active-border-style 'fg=colour201,bold'

# Status bar
set -g status-interval 1
set -g status-justify  left
set -g status-style    'bg=colour0,fg=colour51'
set -g status-left-length  60
set -g status-right-length 80

set -g status-left  '#[fg=colour201,bold]█ #[fg=colour51]#S #[fg=colour129]│ #[fg=colour226]#H #[fg=colour129]│ '
set -g status-right '#[fg=colour129]│ #[fg=colour226]%a %d %b #[fg=colour129]│ #[fg=colour201,bold]%H:%M:%S #[fg=colour129]█'

setw -g window-status-format         '#[fg=colour129]#I:#W'
setw -g window-status-current-format '#[fg=colour201,bold]#I:#W'
setw -g window-status-separator      '  '

# Message / copy-mode colors
set -g message-style       'bg=colour0,fg=colour201,bold'
set -g mode-style          'bg=colour129,fg=colour226,bold'

# Pane splits that keep cwd
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Reload
bind r source-file ~/.tmux.conf \; display-message 'reloaded ~/.tmux.conf'

# Purple Bruce 3-pane layout — Prefix + B
bind B run-shell 'netrunner start &' \; display-message '⚡ Purple Bruce launching...'
